const rand=(a,b)=>a+Math.random()*(b-a);
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const dist=(x1,y1,x2,y2)=>{const dx=x1-x2,dy=y1-y2;return Math.sqrt(dx*dx+dy*dy)};
const lerp=(a,b,t)=>a+(b-a)*t;
function formatGameTime(gm){ const h=Math.floor(gm/60),m=Math.floor(gm%60); return `${h}:${String(m).padStart(2,'0')}`; }
function pickWeighted(es){ const t=es.reduce((s,e)=>s+e.w,0); let r=Math.random()*t; for(const e of es){r-=e.w;if(r<=0)return e.v;} return es[es.length-1].v; }
function workspaceRect(){ const s=Math.min(W,H)*PLAYER.workspaceRatio; return{x:W/2-s/2,y:H/2-s/2,w:s,h:s,cx:W/2,cy:H/2,s}; }
function nearestEnemy(x,y){ let b=null,bd=Infinity; for(const e of game.enemies){ if(e.friendly||e.fleeing) continue; const d=dist(x,y,e.x,e.y); if(d<bd){bd=d;b=e;} } return b; }
function nearestNEnemies(x,y,n){ return game.enemies.filter(e=>!e.friendly&&!e.fleeing).map(e=>({e,d:dist(x,y,e.x,e.y)})).sort((a,b)=>a.d-b.d).slice(0,n).map(a=>a.e); }

let audioCtx=null;
function playKeySound(){
  try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='square'; o.frequency.value=rand(700,1100);
    g.gain.setValueAtTime(0.03,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.02);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.02);
  }catch(e){}
}

// === 8-bit 背景音乐 ===
let audioCtx=null, bgmTimer=null, bgmStep=0;
const BGM_NOTES = [
  // C 大调激昂进行：C E G B C5 B G E (循环)
  262, 330, 392, 494, 523, 494, 392, 330,
  294, 370, 440, 587, 659, 587, 440, 370,
  330, 415, 494, 659, 698, 659, 494, 415,
  262, 330, 392, 523, 659, 784, 659, 523,
];
const BGM_BASS = [131, 131, 196, 196, 165, 165, 196, 196];
function startBGM(){
  if(bgmTimer) return;
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    bgmStep=0;
    const tempo = 0.18; // 每音符间隔秒
    bgmTimer = setInterval(()=>{
      if(game.state!==State.PLAYING && game.state!==State.PAUSED) return;
      const t=audioCtx.currentTime;
      // 主旋律
      const freq = BGM_NOTES[bgmStep % BGM_NOTES.length];
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='square'; o.frequency.value=freq;
      g.gain.setValueAtTime(0.06,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+tempo*0.9);
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+tempo*0.95);
      // 贝斯（每 2 步一个音）
      if(bgmStep%2===0){
        const bf=BGM_BASS[(bgmStep/2)%BGM_BASS.length];
        const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
        o2.type='triangle'; o2.frequency.value=bf;
        g2.gain.setValueAtTime(0.08,t);
        g2.gain.exponentialRampToValueAtTime(0.001,t+tempo*1.8);
        o2.connect(g2); g2.connect(audioCtx.destination); o2.start(t); o2.stop(t+tempo*1.9);
      }
      // 鼓点（每 4 步一声噪音）
      if(bgmStep%4===0){
        const bufferSize = audioCtx.sampleRate*0.05;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0;i<bufferSize;i++) data[i]=Math.random()*2-1;
        const noise=audioCtx.createBufferSource(), ng=audioCtx.createGain();
        noise.buffer=buffer;
        ng.gain.setValueAtTime(0.04,t);
        ng.gain.exponentialRampToValueAtTime(0.001,t+0.05);
        noise.connect(ng); ng.connect(audioCtx.destination); noise.start(t); noise.stop(t+0.05);
      }
      bgmStep++;
    }, tempo*1000);
  }catch(e){}
}

function spawnEnemy(type){
  const cfg=ENEMIES[type];
  const side=randInt(0,3); let x,y; const m=40;
  if(side===0){x=rand(-m,W+m);y=-m;}else if(side===1){x=W+m;y=rand(-m,H+m);}
  else if(side===2){x=rand(-m,W+m);y=H+m;}else{x=-m;y=rand(-m,H+m);}
  const ws=workspaceRect(), dx=ws.cx-x, dy=ws.cy-y, len=Math.sqrt(dx*dx+dy*dy)||1;
  const texts=cfg.texts||[''], text=texts[randInt(0,texts.length-1)];
  ctx.font='13px -apple-system, "PingFang SC", sans-serif';
  const tw=ctx.measureText(text).width, bw=Math.max(cfg.size*2.5,tw+20), bh=cfg.size*1.8;
  game.enemies.push({ type,x,y, vx:dx/len*cfg.speed, vy:dy/len*cfg.speed,
    hp:cfg.hp,maxHp:cfg.hp,size:cfg.size,bw,bh,color:cfg.color,dmg:cfg.dmg,label:cfg.label,
    stun:cfg.stun||0, drain:cfg.drain||0, friendly:false, life:0, text,
    shootTimer:0, stationary:false, boomerang:0,
  });
}

// ============================================================
// === 子弹 ===
// ============================================================
function fireBullet(char, opts={}){
  const p=game.player, ws=workspaceRect();
  const spd = opts.isSpace?7:8;
  let dmg = PLAYER.baseDamage + game.stats.damageBonus;
  if(opts.isSpace) dmg+=1;

  // 压力高 fumble
  let displayChar=char, aimOff=0;
  const maxP=PLAYER.maxPressure+p.maxPressureBonus;
  if(p.pressure>=maxP*0.7){
    if(Math.random()<0.25){ displayChar=String.fromCharCode(65+randInt(0,25)); aimOff=rand(-1.5,1.5); }
    if(Math.random()<0.15){ const g='★☆♠♣♥♦✿❀☁☂☀☾'; displayChar=g[randInt(0,g.length-1)]; }
  } else if(p.pressure>=maxP*0.5 && Math.random()<0.15){
    if(Math.random()<0.5) displayChar=String.fromCharCode(65+randInt(0,25));
    aimOff=rand(-0.6,0.6);
  }

  // Ctrl+V 多发追踪
  if(game.skillActive[1] > 0){
    const tars = nearestNEnemies(ws.cx, ws.cy, 3 + game.stats.pasteBonus);
    for(const target of tars){
      const dx=target.x-ws.cx, dy=target.y-ws.cy, l=Math.sqrt(dx*dx+dy*dy)||1;
      game.bullets.push({x:ws.cx,y:ws.cy, vx:dx/l*spd+aimOff, vy:dy/l*spd+aimOff,
        damage:dmg, char:displayChar, friendly:true, life:0, color:COLORS.white,
        isSpace:!!opts.isSpace,isEnter:!!opts.isEnter,pierceLeft:opts.isEnter?1:0,
        size:opts.isSpace?1.3:1.0, trail:[],
      });
    }
  } else {
    const target=nearestEnemy(p.x,p.y);
    let vx=rand(-1,1), vy=-8;
    if(target){ const dx=target.x-ws.cx,dy=target.y-ws.cy,l=Math.sqrt(dx*dx+dy*dy)||1;
      vx=dx/l*spd+aimOff; vy=dy/l*spd+aimOff; }
    game.bullets.push({x:ws.cx,y:ws.cy,vx,vy,damage:dmg,char:displayChar,friendly:true,life:0,
      color:opts.isSpace?COLORS.cyan:(opts.isEnter?COLORS.green:COLORS.white),
      isSpace:!!opts.isSpace,isEnter:!!opts.isEnter,pierceLeft:opts.isEnter?1:0,
      size:opts.isSpace?1.3:1.0, trail:[],
    });
  }
  if(!game.skillActive[0]) p.energy = Math.max(0, p.energy - PLAYER.energyCostPerKey * game.stats.energyCostMult);
  game.combo++; game.maxCombo=Math.max(game.maxCombo,game.combo); game.comboTimer=2.0;
  p.pose='typing'; p.poseTimer=0; p.lastAtk=NOW();
  playKeySound(opts);
}

// ============================================================
// === 技能充能与释放 ===
// ============================================================
function addSkillCharge(idx, amount){
  const s=SKILLS[idx]; if(!s) return;
  const need = s.chargeNeed / game.stats.chargeSpeedMult;
  game.skillCharge[idx] = Math.min(need, game.skillCharge[idx]+amount);
}
function canUseSkill(idx){ return game.skillCharge[idx] >= SKILLS[idx].chargeNeed/game.stats.chargeSpeedMult; }

function useSkill(idx){
  if(!canUseSkill(idx)||game.player.stunTimer>0||game.kpiEvent.active) return;
  const s=SKILLS[idx];
  const p=game.player;
  switch(s.id){
    case 'coffee':
      game.skillActive[0] = s.duration + game.stats.coffeeBonus;
      break;
    case 'paste':
      game.skillActive[1] = s.duration;
      break;
    case 'milktea':
      game.skillActive[2] = s.duration + game.stats.milkTeaBonus*0.5;
      p.invulnTimer = s.duration + game.stats.milkTeaBonus*0.5;
      p.pressure = Math.max(0, p.pressure - 20 - game.stats.milkTeaBonus*10);
      break;
    case 'breath':
      game.skillActive[3] = s.duration;
      break;
    case 'blame':
      // 全屏 AOE 伤害
      const aoeDmg = 10 * game.stats.blameDamageMult;
      for(const e of game.enemies){
        if(e.friendly) continue;
        e.hp -= aoeDmg;
        spawnParticles(e.x,e.y,COLORS.orange,`-${Math.round(aoeDmg)}`,0.8);
        if(e.hp<=0){
          game.kills++; game.killsSinceLevel++;
          for(let k=0;k<6;k++) game.particles.push({x:e.x,y:e.y,color:e.color,text:'',vx:rand(-3,3),vy:rand(-3,3),life:0.5,maxLife:0.5,isSpark:true,size:rand(2,4)});
        }
      }
      game.enemies = game.enemies.filter(e=>e.hp>0 || e.friendly);
      // 屏幕闪橙
      game.screenFlash = {color:'rgba(209,154,102,0.4)',t:0.3};
      p.pressure = Math.max(0, p.pressure+5);
      p.grad = 0;
      if(game.stats.weeklyReport){}
      else game.skillCharge[4]=0;
      addKillRewards  // 不清空 AOE 击杀奖励
      return;
  }
  game.skillCharge[idx]=0;
}

// ============================================================
// === 升级 ===
// ============================================================
function getKillsForLevel(lv){ return Math.floor(15*Math.pow(1.15, lv)); }
function getUpgradeById(id){ return UPGRADES.find(u=>u.id===id); }
function getCurrentLevel(id){ return game.upgradeLevels[id]||0; }

function pickUpgradeCards(count){
  const available = UPGRADES.filter(u=>{
    const lv = getCurrentLevel(u.id);
    return lv < u.maxLv;
  });
  const cards=[];
  const usedIds=new Set();
  let tries=0;
  while(cards.length<count && tries<100 && available.length>0){
    tries++;
    const tier = pickWeighted([
      {v:'common',w:TIER_WEIGHTS.common},
      {v:'rare',w:TIER_WEIGHTS.rare},
      {v:'epic',w:TIER_WEIGHTS.epic},
      {v:'legendary',w:TIER_WEIGHTS.legendary},
    ]);
    let pool = available.filter(u=>u.tier===tier && !usedIds.has(u.id));
    if(pool.length===0) pool=available.filter(u=>!usedIds.has(u.id));
    if(pool.length===0) break;
    const upg = pool[randInt(0,pool.length-1)];
    usedIds.add(upg.id);
    cards.push({type:'upgrade', upg});
  }
  return cards;
}

function triggerLevelUp(doublePick){
  game.state=State.LEVEL_UP;
  game.levelUps = pickUpgradeCards(5);
  game.doublePickPending = !!doublePick;
  if(game.stats.upgradeShield>0) game.player.invulnTimer = Math.max(game.player.invulnTimer, game.stats.upgradeShield);
}

function applyUpgrade(upg){
  const lv = getCurrentLevel(upg.id);
  if(lv >= upg.maxLv) return;
  game.upgradeLevels[upg.id] = lv+1;
  upg.apply(game.stats, lv+1);
  game.level++;

  // N+1 首次拿清屏
  if(upg.id==='n1_pkg'&&!game.n1Used){ game.n1Used=true;
    for(const e of game.enemies) if(!e.friendly&&!e.fleeing){ e.hp=0; game.kills++; game.killsSinceLevel++; }
    game.enemies = game.enemies.filter(e=>e.hp>0||e.friendly||e.fleeing);
    game.player.grad = Math.max(0, game.player.grad-50);
  }
}

function pickLevelCard(idx){
  if(idx<0||idx>=game.levelUps.length) return;
  const card=game.levelUps[idx];
  if(card.type==='upgrade'){
    applyUpgrade(card.upg);
    game.levelUps=[];
    if(game.doublePickPending){
      game.doublePickPending=false;
      game.levelUps = pickUpgradeCards(5).filter(c=>c.upg.tier!=='legendary');
      return;
    }
    if(card.upg.id==='double_pick'){
      // 双选：立刻再选一张非金
      game.levelUps = pickUpgradeCards(5).filter(c=>c.upg.tier!=='legendary');
      return;
    }
  }
  game.state=State.PLAYING;
}

// ============================================================
// === 主 tick ===
// ============================================================
let lastTime=0;
function tick(dt){
  if(game.state!==State.PLAYING) return;
  const p=game.player, ws=workspaceRect();
  const now=NOW();

  // 时间
  game.gameMinute += TIME.gameMinutesPerRealSec*dt;
  if(game.gameMinute>=TIME.endHour*60){ endGame(true); return; }
  const gm=game.gameMinute/60;

  // 老板查岗
  if(gm>=14.5 && gm<(14.5+6/60) && !game.bossPatrol.active){
    game.bossPatrol.active=true; game.bossPatrol.timer=6; game.bossPatrol.angle=-Math.PI/2;
    spawnParticles(W/2,100,COLORS.red,'👔 老板查岗！',2);
  }
  if(game.bossPatrol.active){
    game.bossPatrol.timer-=dt;
    game.bossPatrol.angle += game.bossPatrol.dir*dt*0.8;
    if(game.bossPatrol.timer<=0) game.bossPatrol.active=false;
  }

  // 下班准备期
  if(!game.finalRush && gm>=17.5){
    game.finalRush=true;
    spawnParticles(W/2,H/3,COLORS.red,'🚨 下班准备期！',3);
  }

  // 状态计时
  for(let i=0;i<5;i++){
    if(game.skillActive[i]>0) game.skillActive[i]=Math.max(0,game.skillActive[i]-dt);
  }
  p.invulnTimer=Math.max(0,p.invulnTimer-dt);
  p.stunTimer=Math.max(0,p.stunTimer-dt);
  p.hitFlash=Math.max(0,p.hitFlash-dt);
  p.comboTimer=Math.max(0,p.comboTimer-dt);
  p.hitShake=Math.max(0,p.hitShake-dt);
  if(game.screenFlash){ game.screenFlash.t-=dt; if(game.screenFlash.t<=0) game.screenFlash=null; }
  if(p.comboTimer<=0) game.combo=0;

  // 咖啡成瘾自动触发
  if(game.stats.coffeeAddict && p.energy<30 && game.skillActive[0]<=0 && game.stats.coffeeAddictCd<=0){
    game.skillActive[0] = 4; game.stats.coffeeAddictCd=30;
  }
  if(game.stats.coffeeAddictCd>0) game.stats.coffeeAddictCd-=dt;

  // 打字检测
  const typing = p.lastKeyTime && (now-p.lastKeyTime<0.5);
  const slack = game.skillActive[2]>0;
  const coffee = game.skillActive[0]>0;
  const breath = game.skillActive[3]>0;

  // 体力回复/消耗
  if(!slack){
    p.energy = Math.min(PLAYER.maxEnergy+p.maxEnergyBonus,
      p.energy + PLAYER.energyRegenPerSec*game.stats.energyRegenMult*dt);
  }

  // 压力逻辑
  if(slack){
    p.pressure = Math.max(0, p.pressure - 8*dt);
  } else if(breath){
    p.pressure = Math.max(0, p.pressure - (4+game.stats.breathBonus)*dt);
  } else {
    const before=p.pressure, beforeG=p.grad;
    if(typing) p.pressure = Math.min(PLAYER.maxPressure+p.maxPressureBonus, p.pressure + PLAYER.pressureTypingRise*dt);
    else p.pressure = Math.max(0, p.pressure - PLAYER.pressureIdleFall*game.stats.pressureIdleMult*dt);
    // 深呼吸充能：压力涨多少就加多少
    if(p.pressure>before) addSkillCharge(3, p.pressure-before);
  }
  if(game.stats.pressureRegenPerSec>0 && !typing)
    p.pressure = Math.max(0, p.pressure - game.stats.pressureRegenPerSec*dt);

  // 毕业进度
  let beforeG=p.grad;
  if(slack && !game.stats.kpiNoDrop) p.grad = Math.min(PLAYER.maxGrad+p.maxGradBonus, p.grad+PLAYER.gradRisePerSec*2*dt);
  else if(typing && !slack) p.grad = Math.max(0, p.grad - PLAYER.gradFallPerSec*dt);
  else if(!slack) p.grad = Math.min(PLAYER.maxGrad+p.maxGradBonus, p.grad+PLAYER.gradRisePerSec*dt);
  // 甩锅充能：毕业涨多少加多少
  if(p.grad>beforeG) addSkillCharge(4, p.grad-beforeG);

  // 毕业进度满→约谈
  if(p.grad>=PLAYER.maxGrad+p.maxGradBonus && !game.kpiEvent.active && game.kpiEvent.cd<=0){
    game.kpiEvent.active=true; game.kpiEvent.timer=5; game.kpiEvent.cd=20; p.grad=30;
    spawnParticles(W/2,100,COLORS.red,'⚠️ 你被优化了！',2);
  }
  if(game.kpiEvent.cd>0) game.kpiEvent.cd-=dt;
  if(game.kpiEvent.active){
    game.kpiEvent.timer-=dt;
    if(game.kpiEvent.timer<=0) game.kpiEvent.active=false;
  }

  // 自动点击器：体力=0 自动打字
  if(game.stats.autoClicker && p.energy<=0 && !coffee && p.stunTimer<=0 && !slack){
    if(Math.random()<0.5*dt*7){
      const ch = String.fromCharCode(65+randInt(0,25));
      p.lastAtk = now;
      // 模拟按键
      fireBullet(ch);
      if(!game.skillActive[0]) p.energy -= PLAYER.energyCostPerKey * game.stats.energyCostMult;
    }
  }

  // 技能充能（按来源累积）
  // 咖啡(0)、Ctrl+V(1)：按键数
  // 摸鱼(2)：体力消耗已在 fireBullet 中累计
  // 深呼吸(3)：压力上涨累计
  // 甩锅(5→4)：毕业进度上涨累计（在毕业进度涨时加）

  // 敌人生成
  let spawnRate=0.8;
  if(gm<10)spawnRate=0.9; else if(gm<11.5)spawnRate=0.7; else if(gm<13.5)spawnRate=0.55;
  else if(gm<14.5)spawnRate=0.45; else if(gm<16)spawnRate=0.35; else spawnRate=0.28;
  if(game.finalRush) spawnRate/=3;
  if(game.bossPatrol.active) spawnRate*=0.7;

  game.spawnTimer+=dt;
  while(game.spawnTimer>=spawnRate){
    game.spawnTimer-=spawnRate;
    let type='im'; const r=Math.random();
    if(gm>=10 && r<0.12) type='colleague';
    else if(gm>=11 && r<0.18) type='meeting';
    else if(gm>=12 && r<0.22) type='approval';
    else if(gm>=13.5 && r<0.27) type='comment';
    else if(gm>=14.5 && r<0.30) type='okr';
    spawnEnemy(type);
  }

  // 敌人更新
  for(let i=game.enemies.length-1;i>=0;i--){
    const e=game.enemies[i];
    e.life+=dt;
    if(!slack){
      e.x += e.vx*60*dt; e.y += e.vy*60*dt;
    }

    // 飞出屏幕
    if(e.fleeing||e.friendly){
      if(e.x<-100||e.x>W+100||e.y<-100||e.y>H+100){
        game.enemies.splice(i,1); continue;
      }
      // 友方打敌方
      if(e.friendly){
        for(let j=game.enemies.length-1;j>=0;j--){
          if(j===i) continue;
          const o=game.enemies[j];
          if(o.friendly||o.fleeing)continue;
          const er=Math.max(e.bw||e.size*2.5,e.bh||e.size*1.8)/2;
          const or=Math.max(o.bw||o.size*2.5,o.bh||o.size*1.8)/2;
          if(dist(e.x,e.y,o.x,o.y)<er+or){
            o.hp-=e.damage;
            spawnParticles(o.x,o.y,COLORS.orange,`-${Math.round(e.damage)}`,0.6);
            if(o.hp<=0){
              game.kills++; game.killsSinceLevel++;
              addKillRewards();
              game.enemies.splice(j,1);
            }
          }
        }
      }
      continue;
    }

    // comment 停驻放小弹
    if(e.type==='comment'){
      const m=Math.max(e.bw,e.bh)/2+4;
      const nearEdge = e.x>ws.x-m && e.x<ws.x+ws.w+m && e.y>ws.y-m && e.y<ws.y+ws.h+m;
      const inside = e.x>ws.x&&e.x<ws.x+ws.w&&e.y>ws.y&&e.y<ws.y+ws.h;
      if(inside){
        const dx=ws.cx-e.x, dy=ws.cy-e.y;
        if(Math.abs(dx)>Math.abs(dy)) e.x = dx>0?ws.x+ws.w+m:ws.x-m;
        else e.y = dy>0?ws.y+ws.h+m:ws.y-m;
        e.vx=0;e.vy=0;e.stationary=true;
      }
      if(e.stationary){
        e.shootTimer=(e.shootTimer||0)+dt;
        if(e.shootTimer>=2){ e.shootTimer=0;
          const dx=ws.cx-e.x, dy=ws.cy-e.y, l=Math.sqrt(dx*dx+dy*dy)||1;
          const bs=4*(1-game.stats.enemyBulletSlow);
          game.bullets.push({x:e.x,y:e.y, vx:dx/l*bs,vy:dy/l*bs,
            damage:4, char:'•', friendly:false, enemyBullet:true, life:0,
            color:COLORS.yellow, size:1, trail:[], pierceLeft:0,
          });
        }
      }
    }

    // approval 贴边扣体力
    if(e.type==='approval'){
      const m=Math.max(e.bw,e.bh)/2+4;
      const near=e.x>ws.x-m&&e.x<ws.x+ws.w+m&&e.y>ws.y-m&&e.y<ws.y+ws.h+m;
      if(near){
        if(!e.stationary){e.vx=0;e.vy=0;e.stationary=true;}
        p.energy=Math.max(0,p.energy-e.drain*game.stats.approvalDrainMult*dt);
      }
    }

    // 击中玩家
    const isStationary = e.stationary;
    const maxP = PLAYER.maxPressure+p.maxPressureBonus;
    if(!isStationary && e.x>ws.x && e.x<ws.x+ws.w && e.y>ws.y && e.y<ws.y+ws.h){
      if(p.invulnTimer<=0){
        let dmg=e.dmg;
        if(game.bossPatrol.active) dmg*=2;
        if(game.kpiEvent.active) dmg*=2;
        if(e.type==='im') dmg*=game.stats.imDamageMult;
        if(p.shield){ p.shield=false; dmg=0; spawnParticles(p.x,p.y,COLORS.blue,'🛡️',1); }
        if(dmg>0){
          if(e.stun>0){ p.stunTimer=e.stun; p.pressure=Math.min(maxP,p.pressure+dmg*2); }
          else p.pressure=Math.min(maxP,p.pressure+dmg);
          p.hitFlash=0.4; p.hitShake=0.3; p.invulnTimer=0.5;
          spawnParticles(p.x,p.y,COLORS.red,`+${Math.round(dmg)}压力`,0.8);
          addSkillCharge(3, dmg);
          addSkillCharge(4, e.dmg*0.3);
          if(game.stats.passiveCounter && Math.random()<0.25){
            e.friendly=true; e.color=COLORS.orange; e.damage=dmg; e.vx=-e.vx; e.vy=-e.vy;
          }
        }
      }
      game.enemies.splice(i,1); game.combo=0;
      if(p.pressure>=maxP){
        if(!trySeverance()){ endGame(false,'精神崩溃'); return; }
      }
    }
  }

  // 子弹更新
  for(let i=game.bullets.length-1;i>=0;i--){
    const b=game.bullets[i];
    b.x+=b.vx*60*dt; b.y+=b.vy*60*dt; b.life+=dt;
    b.trail.push({x:b.x,y:b.y}); if(b.trail.length>(b.isEnter?10:5))b.trail.shift();
    if(b.life>3||b.x<-50||b.x>W+50||b.y<-50||b.y>H+50){game.bullets.splice(i,1);continue;}

    if(b.enemyBullet){
      if(dist(b.x,b.y,ws.cx,ws.cy)<Math.max(ws.w,ws.h)/2-10){
        if(p.invulnTimer<=0 && !p.shield){
          let dmg=b.damage;
          if(game.bossPatrol.active)dmg*=2;
          if(game.kpiEvent.active)dmg*=2;
          dmg*=game.stats.commentBulletMult;
          const maxP=PLAYER.maxPressure+p.maxPressureBonus;
          p.pressure=Math.min(maxP,p.pressure+dmg);
          p.hitFlash=0.3;
          spawnParticles(b.x,b.y,COLORS.red,`+${dmg}压力`,0.6);
          addSkillCharge(3,dmg);
          game.bullets.splice(i,1);
          if(p.pressure>=maxP){ if(!trySeverance()){endGame(false,'精神崩溃');return;} }
        } else if(p.shield){
          p.shield=false; spawnParticles(p.x,p.y,COLORS.blue,'🛡️',1); game.bullets.splice(i,1);
        }
      }
      continue;
    }

    let hit=false;
    for(let j=game.enemies.length-1;j>=0;j--){
      const e=game.enemies[j];
      if(e.friendly||e.fleeing)continue;
      const er=Math.max(e.bw||e.size*2.5,e.bh||e.size*1.8)/2;
      if(dist(b.x,b.y,e.x,e.y)<er+8){
        e.hp-=b.damage;
        spawnParticles(e.x,e.y,COLORS.white,`-${Math.round(b.damage)}`,0.5);
        if(e.hp<=0){
          for(let k=0;k<6;k++) game.particles.push({x:e.x,y:e.y,color:e.color,text:'',
            vx:rand(-3,3),vy:rand(-3,3),life:0.5,maxLife:0.5,isSpark:true,size:rand(2,4)});
        }
        if(b.isEnter&&b.pierceLeft>0){b.pierceLeft--;hit=true;}
        else{game.bullets.splice(i,1);hit=true;}
        if(e.hp<=0){
          game.kills++; game.killsSinceLevel++;
          addKillRewards();
          spawnParticles(e.x,e.y,e.color,'✓已读',0.8);
          // 技能充能
          addSkillCharge(0,1); addSkillCharge(1,1);
          game.enemies.splice(j,1);
        }
        break;
      }
    }
  }

  // 粒子
  for(let i=game.particles.length-1;i>=0;i--){
    const pt=game.particles[i];
    pt.y += pt.vy!==undefined?pt.vy:-1.5;
    if(pt.isSpark){ pt.x+=pt.vx||0; pt.y+=pt.vy||0; }
    pt.life-=dt;
    if(pt.life<=0) game.particles.splice(i,1);
  }

  // 升级触发
  if(game.killsSinceLevel>=getKillsForLevel(game.level)){
    game.killsSinceLevel=0;
    triggerLevelUp(false);
  }
}

function addKillRewards(){
  const p=game.player,s=game.stats;
  if(s.energyOnKill) p.energy=Math.min(PLAYER.maxEnergy+p.maxEnergyBonus, p.energy+s.energyOnKill);
  if(s.pressureOnKill) p.pressure=Math.max(0,p.pressure-s.pressureOnKill);
}

function onKeyDown(e){
  const key=e.key; const now=NOW();
  if(key==='Escape'){
    e.preventDefault();
    if(game.state===State.PLAYING) game.state=State.PAUSED;
    else if(game.state===State.PAUSED) game.state=State.PLAYING;
    else if(game.state===State.PAUSED_HELP) game.state=State.PAUSED;
    else if(game.state===State.LEVEL_UP){game.levelUps=[];game.state=State.PLAYING;}
    return;
  }
  if(game.state===State.LEVEL_UP){
    const n=parseInt(key);
    if(n>=1&&n<=game.levelUps.length) pickLevelCard(n-1);
    return;
  }
  if(game.state!==State.PLAYING) return;

  if(key==='Tab'||key===' '||key==='Backspace'||key==='Enter') e.preventDefault();

  // 技能 1-5
  if(key>='1'&&key<='5'){ useSkill(parseInt(key)-1); return; }

  // 攻击键
  let fireChar=null, fireOpts={};
  if(/^[a-zA-Z]$/.test(key)){ fireChar=key.toUpperCase(); }
  else if(key===' '){ fireChar='␣'; fireOpts.isSpace=true; }
  else if(key==='Enter'){ fireChar='⏎'; fireOpts.isEnter=true; }

  if(fireChar){
    if(game.player.stunTimer>0) return;
    if(game.skillActive[2]>0) return; // 摸鱼期间不能打
    let canFire=true;
    const energyZero=game.player.energy<=0;
    if(energyZero && !game.stats.burnMidnight && !game.stats.autoClicker) canFire=false;
    const maxP=PLAYER.maxPressure+game.player.maxPressureBonus;
    const pressureCrit = game.player.pressure>=maxP*0.7 && !game.stats.stableMind;
    if(pressureCrit) canFire=false;

    const coffee=game.skillActive[0]>0;
    // 体力梯度
    const maxE=PLAYER.maxEnergy+game.player.maxEnergyBonus;
    const eRatio=maxE>0?game.player.energy/maxE:1;
    let eMult = eRatio>=0.8?1: eRatio<=0.3?0.5: 0.5+0.5*(eRatio-0.3)/0.5;
    // 咖啡：体力归零后还能打（不消耗体力）

    game.player.lastKeyTime = now;
    if(canFire){
      game.player.lastFire = now;
      fireBullet(fireChar,fireOpts);
      // 熬夜修仙：体力0时每发+1压力
      if(energyZero && game.stats.burnMidnight){
        const maxP=PLAYER.maxPressure+game.player.maxPressureBonus;
        game.player.pressure=Math.min(maxP, game.player.pressure+1);
        if(game.player.pressure>=maxP){ if(!trySeverance()){endGame(false,'精神崩溃');return;} }
      }
      // 咖啡双发：额外打第二近的敌人
      if(coffee){
        const targets = nearestNEnemies(game.player.x, game.player.y, 2);
        if(targets.length>=2){
          const t=targets[1];
          const ws=workspaceRect();
          const dx=t.x-ws.cx, dy=t.y-ws.cy, l=Math.sqrt(dx*dx+dy*dy)||1;
          game.bullets.push({x:ws.cx,y:ws.cy,vx:dx/l*8,vy:dy/l*8,damage:PLAYER.baseDamage+game.stats.damageBonus,char:fireChar,friendly:true,life:0,color:COLORS.orange,isSpace:!!fireOpts.isSpace,isEnter:!!fireOpts.isEnter,pierceLeft:0,size:fireOpts.isSpace?1.3:1.0,trail:[]});
        }
      }
      addSkillCharge(0,1); addSkillCharge(1,1);
      if(!coffee) addSkillCharge(2,PLAYER.energyCostPerKey * game.stats.energyCostMult);
      else addSkillCharge(2,0); // 咖啡不耗体力
    }
  }
}

function pointInRect(px,py,r){return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h;}
function btnStartRect(){const w=240,h=56;return{x:W/2-w/2,y:H/2+60,w,h};}
function btnTitleHelpRect(){const w=200,h=48;return{x:W/2-w/2,y:H/2+130,w,h};}
function btnResumeRect(){const w=200,h=48;return{x:W/2-w/2,y:H/2,w,h};}
function btnQuitRect(){const w=200,h=48;return{x:W/2-w/2,y:H/2+70,w,h};}
function btnHelpRect(){const w=200,h=48;return{x:W/2-w/2,y:H/2+140,w,h};}
function btnHelpBackRect(){const w=120,h=40;return{x:30,y:H-80,w,h};}
function btnRestartRect(){const w=200,h=48;return{x:W/2-w/2-220,y:H/2+80,w,h};}
function btnTitleRect(){const w=200,h=48;return{x:W/2-w/2+220,y:H/2+80,w,h};}
function btnShareRect(){const w=200,h=48;return{x:W/2-w/2,y:H/2+140,w,h};}
function levelCardRects(){
  const cw=180,ch=220,gap=20, totalW=5*cw+4*gap, sx=(W-totalW)/2, y=H/2-ch/2;
  return game.levelUps.map((_,i)=>({x:sx+i*(cw+gap),y,w:cw,h:ch}));
}
function onMouseClick(e){
  const mx=e.clientX,my=e.clientY;
  if(game.state===State.TITLE){
    if(pointInRect(mx,my,btnStartRect())) startGame();
    else if(pointInRect(mx,my,btnTitleHelpRect())){ helpReturnState=State.TITLE; game.state=State.PAUSED_HELP; }
  }
  else if(game.state===State.PAUSED){
    if(pointInRect(mx,my,btnResumeRect())) game.state=State.PLAYING;
    else if(pointInRect(mx,my,btnQuitRect())) game=newGame();
    else if(pointInRect(mx,my,btnHelpRect())){ helpReturnState=State.PAUSED; game.state=State.PAUSED_HELP; }
  }
  else if(game.state===State.PAUSED_HELP){
    if(pointInRect(mx,my,btnHelpBackRect())) game.state=helpReturnState||State.TITLE;
  }
  else if(game.state===State.GAME_OVER){
    if(pointInRect(mx,my,btnRestartRect())) startGame();
    else if(pointInRect(mx,my,btnTitleRect())) game=newGame();
    else if(pointInRect(mx,my,btnShareRect())) exportShareCard();
  }
  else if(game.state===State.LEVEL_UP){
    const cards=levelCardRects();
    for(let i=0;i<cards.length;i++) if(pointInRect(mx,my,cards[i])){pickLevelCard(i);return;}
  }
}
window.addEventListener('click',onMouseClick);

function resize(){
  const dpr=window.devicePixelRatio||1;
  const w=window.innerWidth,h=window.innerHeight;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  W=w;H=h;

}

function drawPlayer(){
  const p=game.player, ws=workspaceRect();

  if(p.shield){ ctx.strokeStyle=COLORS.blue; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,ws.w*0.35,0,Math.PI*2); ctx.stroke(); }
  ctx.globalAlpha = p.invulnTimer>0?0.5:1;
  let face='😊';

  ctx.font='32px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(face,cx,cy);
  ctx.fillStyle=COLORS.border; ctx.fillRect(cx-20,cy+22,40,6);

}
function drawEnemies(){
  for(const e of game.enemies){
    const bw=e.bw||e.size*2.5, bh=e.bh||e.size*1.8;
    if(e.friendly) ctx.fillStyle='rgba(209,154,102,0.15)', ctx.strokeStyle=COLORS.orange;
    else ctx.fillStyle=e.color, ctx.strokeStyle=COLORS.white;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(e.x-bw/2,e.y-bh/2,bw,bh,8); ctx.fill(); ctx.stroke();
    const av=bh*0.55;
    ctx.fillStyle=e.friendly?COLORS.orange:'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(e.x-bw/2+4,e.y-av/2,av,av,4); ctx.fill();
    if(e.label){
      ctx.font=`${Math.min(av,14)}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=COLORS.white; ctx.fillText(e.label,e.x-bw/2+4+av/2,e.y);
    }
    if(e.text && !e.friendly){
      ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font='12px -apple-system,"PingFang SC",sans-serif';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(e.text, e.x-bw/2+4+av+4, e.y, bw-av-12);
    } else if(e.friendly){
      ctx.fillStyle=COLORS.orange; ctx.font='11px sans-serif'; ctx.textAlign='center';
      ctx.fillText('🍳 甩',e.x,e.y);
    }
    if(e.maxHp>1&&!e.friendly&&!e.fleeing){
      ctx.fillStyle=COLORS.border; ctx.fillRect(e.x-bw/2,e.y-bh/2-8,bw,3);
      ctx.fillStyle=COLORS.green; ctx.fillRect(e.x-bw/2,e.y-bh/2-8,bw*(e.hp/e.maxHp),3);

}
function drawBullets(){
  for(const b of game.bullets){
    if(b.trail&&b.trail.length>1){
      for(let i=0;i<b.trail.length;i++){
        const t=b.trail[i]; const a=i/b.trail.length*0.4;
        ctx.globalAlpha=a; ctx.fillStyle=b.color;
        ctx.beginPath();ctx.arc(t.x,t.y,3*b.size*(i/b.trail.length),0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    ctx.fillStyle=b.color;
    ctx.font=`bold ${Math.round(16*(b.isSpace?1.3:1))}px "JetBrains Mono","Fira Code",monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.char,b.x,b.y);
  }
}
function drawParticles(){
  for(const p of game.particles){
    const a=p.life/p.maxLife; ctx.globalAlpha=a;
    if(p.isSpark){
      p.x+=p.vx||0; p.y+=p.vy||0;
      ctx.fillStyle=p.color; ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=p.color; ctx.font='bold 16px "JetBrains Mono",-apple-system,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.text,p.x,p.y);
    }
    ctx.globalAlpha=1;
  }
}
function drawBossPatrol(){
  if(!game.bossPatrol.active)return;
  ctx.fillStyle='rgba(224,108,117,0.1)'; ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(game.bossPatrol.angle);
  const r=Math.max(W,H);
  const grd=ctx.createRadialGradient(0,-r*0.4,0,0,-r*0.4,r*0.6);
  grd.addColorStop(0,'rgba(224,108,117,0.4)'); grd.addColorStop(1,'rgba(224,108,117,0)');
  ctx.fillStyle=grd; ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,-Math.PI/4,Math.PI/4);ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.7)';
  const bx=cx+Math.cos(game.bossPatrol.angle-Math.PI/2)*(Math.min(W,H)*0.45);
  const by=cy+Math.sin(game.bossPatrol.angle-Math.PI/2)*(Math.min(W,H)*0.45);
  ctx.beginPath();ctx.arc(bx,by,24,0,Math.PI*2);ctx.fill();
  ctx.font='28px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👔',bx,by);
}
function drawPressureEffect(){
  if(game.state!==State.PLAYING&&game.state!==State.PAUSED)return;
  const p=game.player.pressure, maxP=PLAYER.maxPressure+game.player.maxPressureBonus;
  if(p<maxP*0.5) return;
  const intensity=(p-maxP*0.5)/(maxP*0.5);
  ctx.fillStyle=`rgba(150,50,200,${0.04+intensity*0.12})`; ctx.fillRect(0,0,W,H);
  const n=Math.floor(15+intensity*70); ctx.fillStyle=`rgba(255,255,255,${0.08+intensity*0.18})`;
  for(let i=0;i<n;i++) ctx.fillRect(rand(0,W),rand(0,H),rand(1,2),rand(1,2));
  const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,`rgba(0,0,0,${0.2+intensity*0.35})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function drawKpiEvent(){

  ctx.fillStyle=COLORS.white; ctx.font='bold 20px -apple-system,"PingFang SC",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';

}
function drawHUD(){
  const p=game.player, ws=workspaceRect();
  const maxP=PLAYER.maxPressure+p.maxPressureBonus;
  const maxE=PLAYER.maxEnergy+p.maxEnergyBonus;
  const maxG=PLAYER.maxGrad+p.maxGradBonus;
  const margin=20;

  // 时间条
  const tp=(game.gameMinute-TIME.startHour*60)/((TIME.endHour-TIME.startHour)*60);
  ctx.fillStyle=COLORS.panel; ctx.fillRect(margin,margin,W-margin*2,24);
  const tc=game.finalRush?COLORS.red:lerpColor(COLORS.feishuBlue,COLORS.red,tp);
  ctx.fillStyle=tc; ctx.fillRect(margin+2,margin+2,(W-margin*2-4)*tp,20);
  ctx.fillStyle=COLORS.white; ctx.font='bold 14px "JetBrains Mono",monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`${formatGameTime(game.gameMinute)}  ${Math.floor(tp*100)}%`,W/2,margin+13);

  // 三资源条
  const barW=180, barH=14, gap=30;
  const bars=[
    {label:'💪 体力',val:p.energy,max:maxE,color:COLORS.yellow},
    {label:'😤 压力',val:p.pressure,max:maxP,color:COLORS.red,reverse:true},

  for(let i=0;i<bars.length;i++){

  const slot=56,sg=8, iy=H-margin-slot, tw=5*slot+4*sg, ix=(W-tw)/2;

  for(let i=0;i<5;i++){
    const x=ix+i*(slot+sg);
    const ready = canUseSkill(i);

    ctx.strokeStyle=ready?COLORS.feishuBlue:COLORS.border; ctx.lineWidth=ready?3:2; ctx.strokeRect(cx,cy,cw,ch);
    const sk=SKILLS[i];
    ctx.globalAlpha=game.skillActive[i]>0?1: (ready?1:0.5);
    ctx.font=`${Math.round(28*pulse)}px sans-serif`; ctx.fillText(sk.emoji,x+slot/2,iy+slot/2-8);

    // 充能条

    const ch2=slot*clamp(game.skillCharge[i]/need,0,1);

    }
    ctx.fillStyle=COLORS.gray; ctx.font='11px sans-serif';
    ctx.fillText((i+1).toString(),x+10,iy+10);
  }

  // Buff 状态文字
  let fx=margin, fy=margin+50+3*gap+10;
  ctx.textAlign='left'; ctx.font='12px sans-serif';
  if(p.stunTimer>0){ctx.fillStyle=COLORS.purple;ctx.fillText(`😴 硬直 ${p.stunTimer.toFixed(1)}s`,fx,fy);fy+=18;}

function wrapText(text,cx,cy,maxW,lh){
  ctx.textAlign='center'; ctx.textBaseline='top';
  let line='',ly=cy;
  for(const ch of text){
    if(ctx.measureText(line+ch).width>maxW && line){
      ctx.fillText(line,cx,ly); line=ch; ly+=lh;
    } else line+=ch;
  }
  if(line) ctx.fillText(line,cx,ly);
}
function drawLevelUpScreen(){
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=COLORS.white; ctx.font='bold 36px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⚡ 升级！'+(game.doublePickPending?'（双选）':'选一张卡'),W/2,H/2-160);
  const cards=levelCardRects();
  for(let i=0;i<cards.length;i++){
    const c=cards[i], card=game.levelUps[i];
    const hover=pointInRect(mouseX,mouseY,c);
    const isItem=card.type==='item';
    const tierColor=isItem?TIER_COLORS.item:TIER_COLORS[card.upg.tier];
    ctx.fillStyle=hover?'#1f2937':COLORS.panel;
    ctx.beginPath();ctx.roundRect(c.x,c.y,c.w,c.h,12);ctx.fill();
    ctx.strokeStyle=tierColor; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle=tierColor; ctx.font='bold 24px sans-serif';
    ctx.fillText(`[${i+1}]`,c.x+24,c.y+30);
    const u=card.upg;
    ctx.fillStyle=tierColor; ctx.font='14px sans-serif';
    ctx.fillText(u.tier.toUpperCase(),c.x+c.w/2,c.y+50);
    ctx.fillStyle=COLORS.white; ctx.font='bold 17px sans-serif';
    ctx.fillText(u.name,c.x+c.w/2,c.y+85);
    const lv=getCurrentLevel(u.id)+1;
    ctx.fillStyle=COLORS.cyan; ctx.font='12px sans-serif';
    ctx.fillText(`Lv.${lv}/${u.maxLv}`,c.x+c.w/2,c.y+108);
    ctx.fillStyle=COLORS.cyan; ctx.font='12px sans-serif';
    wrapText(u.desc,c.x+c.w/2,c.y+130,c.w-20,16);
  }
}

  } else {
    ctx.fillStyle=COLORS.red; ctx.font='bold 44px sans-serif';
    ctx.fillText(game.gameOverReason==='精神崩溃'?'😵 精神崩溃':'☠️ 加班猝死',W/2,H/2-160);

function exportShareCard(){
  const cw=1200,ch=630, c=document.createElement('canvas'); c.width=cw;c.height=ch;
  const x=c.getContext('2d');

  grd.addColorStop(0,'#3370ff'); grd.addColorStop(1,game.won?'#98c379':'#e06c75');
  x.fillStyle=grd; x.fillRect(0,0,cw,8);
  x.fillStyle='#e6edf3'; x.textAlign='left';x.textBaseline='top';
  x.font='bold 56px -apple-system,sans-serif'; x.fillText('Six to Survive · 撑到六点',60,60);
  x.font='28px sans-serif'; x.fillStyle=game.won?'#98c379':'#e06c75';
  x.fillText(game.won?'✓ 下班成功！':(game.gameOverReason==='精神崩溃'?'😵 精神崩溃':'☠️ 加班猝死'),60,140);
  x.strokeStyle='#30363d';x.lineWidth=2;x.beginPath();x.moveTo(60,200);x.lineTo(cw-60,200);x.stroke();
  const endT=game.endTime||performance.now()/1000, dur=endT-game.startTime;
  const mi=Math.floor(dur/60),sc=Math.floor(dur%60);
  const stats=[
    ['存活到',formatGameTime(Math.min(game.gameMinute,TIME.endHour*60))],
    ['本局时长',`${mi}:${String(sc).padStart(2,'0')}`],
    ['击杀消息',`${game.kills} 条`],
    ['技能使用',`${game.itemUses} 次`],
    ['获得词条',`${game.level} 个`],
    ['最高连击',`${game.maxCombo}`],
  ];
  x.font='20px sans-serif'; x.fillStyle='#8b949e';
  const colW=(cw-120)/3;
  stats.forEach((s,i)=>{const col=i%3,row=Math.floor(i/3);const sx=60+col*colW,sy=230+row*120;
    x.fillText(s[0],sx,sy); x.fillStyle='#e6edf3'; x.font='bold 42px "JetBrains Mono",sans-serif';
    x.fillText(s[1],sx,sy+32); x.fillStyle='#8b949e'; x.font='20px sans-serif';
  });
  x.font='18px sans-serif';x.fillStyle='#56b6c2';
  if(game.won) x.fillText('我先下班了，周末不看飞书 👋',60,ch-60);
  else x.fillText('你的工位亮了一整夜。',60,ch-60);
  x.textAlign='right';x.fillStyle='#30363d';x.font='16px sans-serif';
  x.fillText('Six to Survive  v0.0.4',cw-60,ch-60);
  c.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url; a.download=`six-to-survive-${game.won?'win':'lose'}-${Date.now()}.png`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    spawnParticles(W/2,H/2-40,COLORS.green,'📸 战绩图已保存',2);
  },'image/png');
}
function lerpColor(c1,c2,t){
  const p=c=>[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
  const[r1,g1,b1]=p(c1),[r2,g2,b2]=p(c2);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}
function loop(ts){
  if(!lastTime)lastTime=ts; let dt=(ts-lastTime)/1000; lastTime=ts; dt=Math.min(dt,0.05);
  tick(dt);
  const shake = game.player.hitShake>0 ? rand(-6,6)*game.player.hitShake : 0;
  ctx.save();
  ctx.translate(shake, shake);
  drawBackground();
  if(game.state===State.PAUSED_HELP){
    drawHelpScreen();
  } else if(game.state===State.TITLE){
    drawTitleScreen();
  } else {
    drawWorkspace(); drawPlayer(); drawBullets(); drawEnemies(); drawParticles();
    drawBossPatrol(); drawHUD(); drawKpiEvent(); drawPressureEffect();
    if(game.state===State.PAUSED) drawPauseScreen();
    if(game.state===State.LEVEL_UP) drawLevelUpScreen();
    if(game.state===State.GAME_OVER) drawGameOverScreen();
  }
  ctx.restore();
  if(game.screenFlash){
    ctx.fillStyle = game.screenFlash.color;
    ctx.globalAlpha = game.screenFlash.t/0.3;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
